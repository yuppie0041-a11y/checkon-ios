name: Build and Upload to App Store

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document > /dev/null 2>&1
          pod install > /dev/null 2>&1
          echo "pod install done"

      - name: Remove Pods aggregate framework from build phase
        run: |
          cat > /tmp/fix_project.rb << 'RUBY'
          require 'xcodeproj'
          proj_path = "마음안전365 체크온.xcodeproj"
          project = Xcodeproj::Project.open(proj_path)
          target = project.targets.find { |t| t.name == "마음안전365 체크온" }
          abort "ERROR: target not found" unless target
          phase = target.frameworks_build_phase
          before = phase.files.map { |f| f.display_name.to_s }
          puts "Frameworks before (#{before.count}): #{before.inspect}"
          to_remove = phase.files.select { |f| f.display_name.to_s =~ /Pods_/ }
          puts "Removing #{to_remove.count} aggregate framework(s)"
          to_remove.each do |bf|
            name = bf.display_name.to_s
            ref = bf.file_ref
            bf.remove_from_project
            begin; ref.remove_from_project; rescue; end
            puts "  Removed: #{name}"
          end
          after = target.frameworks_build_phase.files.map { |f| f.display_name.to_s }
          puts "Frameworks after (#{after.count}): #{after.inspect}"
          project.save
          puts "Project saved OK"
          RUBY
          ruby /tmp/fix_project.rb

      - name: Import Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Show installed certificates
        run: |
          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning build.keychain || true
          echo "=== All identities ==="
          security find-identity -v build.keychain || true

      - name: Install Provisioning Profile
        env:
          PP_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PP_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/checkon.mobileprovision

      - name: Build Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace "마음안전365 체크온.xcworkspace" \
            -scheme "마음안전365 체크온" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/checkon.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Apple Distribution" \
            DEVELOPMENT_TEAM=UX7GD558S8 \
            2>&1 | tee "$RUNNER_TEMP/build.log"

      - name: Show build errors (on failure)
        if: failure()
        run: |
          echo "=== Build errors ==="
          grep -E "(error:|not found|ld: |clang: |Undefined symbol)" "$RUNNER_TEMP/build.log" | head -80 || true
          echo ""
          echo "=== Last 100 lines ==="
          tail -100 "$RUNNER_TEMP/build.log" || true

      - name: Export and Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>kr.co.mindsafe365.checkon</key>
              <string>MindSafe365 Checkon AppStore</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/checkon.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
